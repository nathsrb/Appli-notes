      .ezra-editor strong, .ezra-editor b { color: white; font-weight: 700; }
      .ezra-editor:empty:before { content: attr(placeholder); color: #475569; pointer-events: none; display: block; }
      .ezra-editor.light-mode { color: #1e293b; }

<body><div id="root"></div>
<script type="text/javascript">
const { useState, useEffect, useRef, useMemo, useCallback, useReducer } = window.React;
const { createRoot } = window.ReactDOM;
const html = window.htm.bind(window.React.createElement);

// ═══════════════════════════════════════════════════
// SUPABASE CONFIG — remplacez par vos vraies clés
// ═══════════════════════════════════════════════════
const SUPABASE_URL      = “https://xyz.supabase.co”;
const SUPABASE_ANON_KEY = “VOTRE_SUPABASE_ANON_KEY_ICI”;

let supabaseClient;
try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
catch(e) { console.warn(“Supabase non configuré.”); }
const isSupabaseReady = () => supabaseClient && !SUPABASE_URL.includes(“xyz.supabase.co”);

// ═══════════════════════════════════════════════════
// ICONS
// ═══════════════════════════════════════════════════
const ic = (cls) => ({ size=24, className=””, …p }) => {
const sz = typeof size===‘number’ ? size+‘px’ : size;
return html`<i className=${`ph ${cls} ${className} flex items-center justify-center leading-none`} style=${{fontSize:sz,width:sz,height:sz}} ...${p}></i>`;
};
const FileText=ic(‘ph-file-text’), Search=ic(‘ph-magnifying-glass’), Plus=ic(‘ph-plus’),
Network=ic(‘ph-graph’), Trash2=ic(‘ph-trash’), Trash=ic(‘ph-trash’), Menu=ic(‘ph-list’),
X=ic(‘ph-x’), Folder=ic(‘ph-folder’), FolderOpen=ic(‘ph-folder-open’), Save=ic(‘ph-floppy-disk’),
SidebarClose=ic(‘ph-sidebar-simple’), SidebarOpen=ic(‘ph-list’), ChevronRight=ic(‘ph-caret-right’),
ChevronDown=ic(‘ph-caret-down’), ZoomIn=ic(‘ph-magnifying-glass-plus’), ZoomOut=ic(‘ph-magnifying-glass-minus’),
Target=ic(‘ph-target’), CornerDownRight=ic(‘ph-arrow-bend-down-right’), AlignLeft=ic(‘ph-text-align-left’),
BookOpen=ic(‘ph-book-open-text’), Bold=ic(‘ph-text-b’), Italic=ic(‘ph-text-italic’),
Underline=ic(‘ph-text-underline’), ListIcon=ic(‘ph-list-bullets’), ListOrdered=ic(‘ph-list-numbers’),
Heading1=ic(‘ph-text-h-one’), Heading2=ic(‘ph-text-h-two’), Heading3=ic(‘ph-text-h-three’),
CheckSquare=ic(‘ph-check-square’), RefreshCw=ic(‘ph-arrows-clockwise’), Feather=ic(‘ph-feather’),
Settings=ic(‘ph-gear’), Edit3=ic(‘ph-pencil-simple’), LinkIcon=ic(‘ph-link’), Quote=ic(‘ph-quotes’),
Undo=ic(‘ph-arrow-u-up-left’), Redo=ic(‘ph-arrow-u-up-right’), Lock=ic(‘ph-lock-key’),
Unlock=ic(‘ph-lock-key-open’), Calendar=ic(‘ph-calendar’), IconUser=ic(‘ph-user’),
LogOut=ic(‘ph-sign-out’), Mail=ic(‘ph-envelope-simple’), RotateCcw=ic(‘ph-clock-counter-clockwise’),
Sun=ic(‘ph-sun’), Moon=ic(‘ph-moon’), Rocket=ic(‘ph-rocket’), CheckCircle=ic(‘ph-check-circle’),
DownloadSimple=ic(‘ph-download-simple’), ImageSquare=ic(‘ph-image-square’);

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const escReg = (s) => s.replace(/[.*+?^${}()|[]\]/g,’\$&’);

const stripHtml = (h) => {
if(!h) return ‘’;
return h.replace(/<br\s*/?>/gi,’ ‘).replace(/</p>/gi,’ ‘).replace(/</h[1-6]>/gi,’ ‘)
.replace(/<[^>]*>?/gm,’’).replace(/ /g,’ ‘).replace(/\s+/g,’ ’).trim();
};

const timeAgo = (ts) => {
if(!ts) return ‘’;
const d = Date.now()-ts, m=Math.floor(d/60000);
if(m<1) return “à l’instant”;
if(m<60) return `${m}min`;
const h=Math.floor(m/60); if(h<24) return `${h}h`;
const j=Math.floor(h/24); if(j<7) return `${j}j`;
return new Date(ts).toLocaleDateString(‘fr-FR’,{day:‘numeric’,month:‘short’});
};

const hlTitle = (t,q) => {
if(!q||!t) return t;
try { return t.replace(new RegExp(`(${escReg(q)})`,‘gi’),’<mark class="bg-teal-500/40 text-teal-100 rounded px-0.5">$1</mark>’); }
catch(e){return t;}
};

const applyHL = (html,q) => {
if(!q||!html) return html;
try {
const rx=new RegExp(`(${escReg(q)})`,‘gi’);
return html.split(/(<[^>]*>)/).map((p,i)=>i%2===0&&p.trim()?p.replace(rx,’<mark class="search-hl bg-teal-500/60 text-white rounded px-1">$1</mark>’):p).join(’’);
}catch(e){return html;}
};
const stripHL = (h) => h?h.replace(/<mark class=“search-hl[^>]*>(.*?)</mark>/gi,’$1’):’’;

const getSnippet = (text,q) => {
if(!q||!text) return null;
const i=text.toLowerCase().indexOf(q.toLowerCase());
if(i===-1) return null;
const s=Math.max(0,i-35),e=Math.min(text.length,i+q.length+35);
let sn=text.slice(s,e);
if(s>0)sn=’…’+sn; if(e<text.length)sn+=’…’;
return sn.replace(new RegExp(`(${escReg(q)})`,‘gi’),’<mark class="text-teal-100 bg-teal-500/60 px-1 rounded font-bold">$1</mark>’);
};

const extractLinks = (c) => {
if(!c) return [];
const links=[], r1=/data-link=”([^”]+)”/g, r2=/[[(.*?)]]/g;
let m;
while((m=r1.exec(c))!==null)links.push(m[1]);
while((m=r2.exec(c))!==null)links.push(m[1]);
return […new Set(links)];
};

function useClickOutside(ref,fn) {
useEffect(()=>{
const h=(e)=>{if(!ref.current||ref.current.contains(e.target))return;fn(e);};
document.addEventListener(‘mousedown’,h); document.addEventListener(‘touchstart’,h);
return()=>{document.removeEventListener(‘mousedown’,h);document.removeEventListener(‘touchstart’,h);};
},[ref,fn]);
}

// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const FOLDER_COLORS = [’#14b8a6’,’#6366f1’,’#f59e0b’,’#ec4899’,’#10b981’,’#3b82f6’,’#8b5cf6’,’#f97316’,’#06b6d4’,’#84cc16’,’#e11d48’,’#0891b2’];
const WEEK_DAYS = [‘Lundi’,‘Mardi’,‘Mercredi’,‘Jeudi’,‘Vendredi’,‘Samedi’,‘Dimanche’];
const MATRIX = [
{cls:‘bg-rose-500/10 border-rose-500/30 text-rose-200’,bg:‘bg-rose-500’,action:‘Faire’,sub:‘Urgent & Important’,icon:‘🔴’},
{cls:‘bg-teal-500/10 border-teal-500/30 text-teal-200’,bg:‘bg-teal-500’,action:‘Planifier’,sub:‘Important, Pas Urgent’,icon:‘🟢’},
{cls:‘bg-amber-500/10 border-amber-500/30 text-amber-200’,bg:‘bg-amber-500’,action:‘Déléguer’,sub:‘Urgent, Pas Imp.’,icon:‘🟡’},
{cls:‘bg-slate-500/10 border-slate-500/30 text-slate-300’,bg:‘bg-slate-500’,action:‘Éliminer’,sub:‘Ni Urg. Ni Imp.’,icon:‘⚪’}
];

const INIT_CONTENT = ‘<h1>Bienvenue dans Erza Spark 🚀</h1><p>Votre <b>Second Cerveau</b> est prêt.</p><h2>✨ Démarrer</h2><ul><li>Créez des notes et liez-les avec <strong>[[Nom de note]]</strong></li><li>Visualisez vos connexions dans le <strong>Graphe Cérébral</strong></li><li>Planifiez votre semaine dans l'<strong>Agenda</strong></li></ul>’;
const INIT_NOTES = [{id:genId(),title:‘Bienvenue dans Erza Spark’,type:‘note’,folder:‘Général’,content:INIT_CONTENT,plainText:stripHtml(INIT_CONTENT),isLocked:false,lockPassword:’’,isDeleted:false,lastModified:Date.now()}];

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
const AuthScreen = ({onGuest}) => {
const [tab,setTab]=useState(‘login’), [email,setEmail]=useState(’’), [pwd,setPwd]=useState(’’);
const [err,setErr]=useState(’’), [ok,setOk]=useState(’’), [loading,setLoading]=useState(false);

const handle = async (e) => {
e.preventDefault(); setLoading(true); setErr(’’); setOk(’’);
if(!isSupabaseReady()){setErr(“Supabase non configuré — utilisez le mode local ou insérez vos clés.”);setLoading(false);return;}
try {
if(tab===‘login’){
const{error}=await supabaseClient.auth.signInWithPassword({email,password:pwd});
if(error) throw error;
} else {
const{data,error}=await supabaseClient.auth.signUp({email,password:pwd});
if(error) throw error;
if(!data?.session){setOk(“Compte créé ! Vérifiez vos emails puis connectez-vous.”);setTab(‘login’);setPwd(’’);}
}
} catch(err){
const m=err?.message||’’;
if(m.includes(‘Invalid login credentials’))setErr(“Email ou mot de passe incorrect.”);
else if(m.includes(‘Password should be’))setErr(“Mot de passe trop court (6 caractères min).”);
else if(m.includes(‘already registered’))setErr(“Email déjà utilisé.”);
else setErr(“Erreur : “+m);
} finally{setLoading(false);}
};

const reset = async () => {
if(!email){setErr(“Entrez votre email d’abord.”);return;}
if(!isSupabaseReady()){setErr(“Supabase non configuré.”);return;}
setLoading(true); setErr(’’);
try{const{error}=await supabaseClient.auth.resetPasswordForEmail(email);if(error)throw error;setOk(“Email de réinitialisation envoyé !”);}
catch(e){setErr(“Erreur : “+e.message);}finally{setLoading(false);}
};

return html` <div className="flex h-screen w-full bg-slate-950 items-center justify-center p-4"> <div className="bg-slate-900 p-8 sm:p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl w-full max-w-md relative overflow-hidden"> <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-500 to-indigo-500"></div> <div className="text-center mb-7"> <${Feather} size=${44} className="mx-auto mb-3 text-teal-500/40"/> <h2 className="text-3xl font-serif font-bold text-white mb-1">Erza Spark</h2> <p className="text-sm text-slate-400">Votre Second Cerveau connecté.</p> </div> <div className="flex bg-slate-950 rounded-2xl p-1 mb-6 border border-slate-800"> <button onClick=${()=>{setTab('login');setErr('');setOk('');}} className=${`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${tab===‘login’?‘bg-teal-600 text-white shadow’:‘text-slate-400 hover:text-slate-200’}`}>Connexion</button> <button onClick=${()=>{setTab('register');setErr('');setOk('');}} className=${`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${tab===‘register’?‘bg-teal-600 text-white shadow’:‘text-slate-400 hover:text-slate-200’}`}>Créer un compte</button> </div> <form onSubmit=${handle} className="space-y-4"> <div className="relative"><${Mail} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size=${16}/> <input type="email" value=${email} onChange=${e=>setEmail(e.target.value)} required className="w-full bg-slate-950 border border-slate-800 text-white rounded-xl py-3 pl-10 pr-4 outline-none focus:border-teal-500 transition-colors" placeholder="votre@email.com"/></div> <div> <div className="relative"><${Lock} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size=${16}/> <input type="password" value=${pwd} onChange=${e=>setPwd(e.target.value)} required className="w-full bg-slate-950 border border-slate-800 text-white rounded-xl py-3 pl-10 pr-4 outline-none focus:border-teal-500 transition-colors" placeholder="••••••••"/></div> ${tab==='login'?html`<div className="flex justify-end mt-1.5"><button type="button" onClick=${reset} className="text-[11px] text-teal-500 hover:text-teal-400">Mot de passe oublié ?</button></div>`:null} </div> ${err?html`<div className="p-3 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs rounded-xl text-center">${err}</div>`:null} ${ok?html`<div className="p-3 bg-teal-500/10 border border-teal-500/20 text-teal-300 text-xs rounded-xl text-center flex items-center gap-2 justify-center"><${CheckCircle} size=${13}/>${ok}</div>`:null} <button type="submit" disabled=${loading} className="w-full bg-teal-600 hover:bg-teal-500 text-white py-3.5 rounded-xl font-bold transition-colors shadow-lg shadow-teal-500/20 flex justify-center items-center gap-2 disabled:opacity-50"> ${loading?html`<${RefreshCw} className=“animate-spin” size=${17}/>`:tab==='login'?"Se connecter":"Créer mon compte"} </button> </form> <div className="mt-5 flex flex-col gap-3"> <div className="relative flex items-center"><div className="flex-grow border-t border-slate-800"></div><span className="mx-4 text-slate-600 text-xs uppercase font-bold">OU</span><div className="flex-grow border-t border-slate-800"></div></div> <button onClick=${onGuest} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-3.5 rounded-xl font-bold transition-colors flex justify-center items-center gap-2 border border-slate-700"> <${Save} size=${16}/> Continuer sans compte (Local) </button> </div> </div> </div>`;
};

// ═══════════════════════════════════════════════════
// AGENDA
// ═══════════════════════════════════════════════════
const Agenda = ({events, onUpdate}) => {
const ev = Array.isArray(events) ? events : [];
const add=(day)=>onUpdate([…ev,{id:genId(),day,title:’’,time:’’,color:MATRIX[0].cls}]);
const upd=(id,f,v)=>onUpdate(ev.map(e=>e.id===id?{…e,[f]:v}:e));
const del=(id)=>onUpdate(ev.filter(e=>e.id!==id));

return html` <div className="w-full h-full overflow-x-auto overflow-y-hidden bg-slate-950 p-4 sm:p-6 custom-scrollbar flex gap-4 items-start"> ${WEEK_DAYS.map(day=>html`
<div key=${day} className=“flex-shrink-0 w-[300px] bg-slate-900 rounded-3xl border border-slate-800 flex flex-col” style=${{maxHeight:‘calc(100vh - 130px)’}}>
<div className="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900/95 backdrop-blur rounded-t-3xl z-10">
<h3 className="font-serif font-bold text-slate-200">${day}</h3>
<button onClick=${()=>add(day)} className=“text-slate-400 hover:text-teal-400 p-1.5 bg-slate-800 rounded-xl”><${Plus} size=${15}/></button>
</div>
<div className="p-3 overflow-y-auto custom-scrollbar flex-1 space-y-3 pb-16">
${ev.filter(e=>e.day===day).map(e=>{
const m=MATRIX.find(c=>c.cls===e.color)||MATRIX[0];
return html` <div key=${e.id} className=${`p-3.5 rounded-2xl border flex flex-col gap-2 ${e.color||MATRIX[0].cls}`}> <div className="text-[10px] font-bold uppercase tracking-wider opacity-90">${m.icon} ${m.action} <span className="opacity-60 normal-case">(${m.sub})</span></div> <div className="flex gap-2 items-center"> <input type="text" placeholder="10h00 – 12h00" value=${e.time||''} onChange=${x=>upd(e.id,'time',x.target.value)} className="bg-black/20 text-xs font-mono px-2 py-1.5 rounded-lg outline-none flex-1 placeholder-slate-500 text-slate-200 font-semibold"/> <button onClick=${()=>del(e.id)} className="text-slate-500 hover:text-rose-400 p-1.5 bg-black/20 rounded-lg shrink-0"><${Trash2} size=${13}/></button> </div> <textarea placeholder="Tâche, notes..." value=${e.title||''} onChange=${x=>upd(e.id,'title',x.target.value)} className="bg-transparent outline-none resize-none text-[14px] min-h-[45px] custom-scrollbar text-slate-100 placeholder-slate-500 leading-relaxed"></textarea> <div className="grid grid-cols-2 gap-1.5 pt-2 border-t border-slate-700/50"> ${MATRIX.map(c=>{const s=(e.color||MATRIX[0].cls)===c.cls;return html`
<button key=${c.bg} onClick=${()=>upd(e.id,‘color’,c.cls)} className=${`flex flex-col items-center py-1.5 px-1 rounded-lg border transition-all ${s?`${c.bg} border-transparent text-white`:'bg-black/20 border-slate-700/50 text-slate-400 hover:bg-slate-800'}`}>
<span className="text-[10px] font-bold uppercase">${c.icon} ${c.action}</span>
<span className="text-[8px] opacity-70">${c.sub}</span>
</button>`;})} </div> </div>`;})}
${ev.filter(e=>e.day===day).length===0?html` <div className="text-center p-5 border border-dashed border-slate-700/50 rounded-2xl text-slate-500 text-sm cursor-pointer hover:border-teal-500/50 hover:text-teal-400 hover:bg-teal-500/5 transition-all" onClick=${()=>add(day)}>+ Ajouter</div>`:null}
</div>
</div>`)} </div>`;
};

// ═══════════════════════════════════════════════════
// PASSWORD PROMPT
// ═══════════════════════════════════════════════════
const PasswordPrompt = ({note,onUnlock}) => {
const [pwd,setPwd]=useState(’’), [err,setErr]=useState(false), [rec,setRec]=useState(false), [code,setCode]=useState(’’);

function MainApp({user,onLogout}) {
// Notes — from localStorage, Supabase overrides on init
const [notes,setNotes]=useState(()=>{try{const s=localStorage.getItem(‘erza_notes’);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length>0)return p;}}catch(e){}return INIT_NOTES;});

// ── AGENDA — dedicated key, always persisted ──
const [agendaEvents,setAgendaEvents]=useState(()=>{
try{
const s=localStorage.getItem(‘erza_agenda’);
if(s){const p=JSON.parse(s);if(Array.isArray(p))return p;}
// Fallback: old key format
const old=localStorage.getItem(‘erza_settings’);
if(old){const p=JSON.parse(old);if(Array.isArray(p.agenda))return p.agenda;}
}catch(e){}
return [];
});

const [appSettings,setAppSettings]=useState(()=>{
const def={fontFamily:‘font-sans’,fontSize:‘text-[16px]’,lineSpacing:‘leading-relaxed’,theme:‘dark’};
try{const s=localStorage.getItem(‘erza_settings’);if(s){const p=JSON.parse(s);if(p.appSettings)return{…def,…p.appSettings};}}catch(e){}
return def;
});

const [activeNoteId,setActiveNoteId]=useState(()=>notes.find(n=>!n.isDeleted)?.id||null);
const [viewMode,setViewMode]=useState(‘editor’);
const [searchQuery,setSearchQuery]=useState(’’);

useClickOutside(propsRef,()=>setShowProps(false));
useClickOutside(lockRef,()=>setShowLock(false));

// Refs for Supabase save timers
const agendaTimerRef=useRef(null);
const notesTimerRef=useRef(null);

// ── ALWAYS persist notes to localStorage ──
useEffect(()=>{
clearTimeout(notesTimerRef.current);
notesTimerRef.current=setTimeout(()=>{
try{localStorage.setItem(‘erza_notes’,JSON.stringify(notes));}catch(e){}
},300);
},[notes]);

// ── ALWAYS persist appSettings to localStorage ──
useEffect(()=>{
clearTimeout(settingsTimerRef.current);
settingsTimerRef.current=setTimeout(()=>{
try{localStorage.setItem(‘erza_settings’,JSON.stringify({appSettings,lastUpdated:Date.now()}));}catch(e){}
},300);
},[appSettings]);

useEffect(()=>{

try{localStorage.setItem(‘erza_agenda’,JSON.stringify(agendaEvents));}catch(e){}
// Supabase save — only after initialization
if(!initializedRef.current||!user||user.isGuest||!isSupabaseReady()) return;
clearTimeout(agendaTimerRef.current);
agendaTimerRef.current=setTimeout(async()=>{
try{
await supabaseClient.from(‘user_settings’).upsert({
user_id:user.id, agenda:agendaEvents, agenda_ts:Date.now(), appSettings
},{onConflict:‘user_id’});
}catch(err){console.error(‘Agenda Supabase save:’,err);}
},700);
},[agendaEvents,user]);

// ── Supabase init ──
useEffect(()=>{
if(!user)return;
const load=async()=>{
if(user.isGuest||!isSupabaseReady()){initializedRef.current=true;setInitializing(false);return;}
try{
const{data:nd,error:ne}=await supabaseClient.from(‘notes’).select(’*’).eq(‘user_id’,user.id);
if(ne) throw ne;
if(nd&&nd.length>0){
const mapped=nd.map(n=>({id:n.id,title:n.title,type:n.type,folder:n.folder,content:n.content,
plainText:n.plainText||n.plain_text||’’,isLocked:n.isLocked||false,lockPassword:n.lockPassword||’’,
isDeleted:n.isDeleted||false,lastModified:n.lastModified||Date.now()
})).sort((a,b)=>b.lastModified-a.lastModified);
setNotes(mapped);
setActiveNoteId(mapped.find(n=>!n.isDeleted)?.id||null);
} else {
const init={…INIT_NOTES[0],user_id:user.id};
setNotes([init]);setActiveNoteId(init.id);
await supabaseClient.from(‘notes’).insert(init);
}
// Load settings + agenda
const{data:sd}=await supabaseClient.from(‘user_settings’).select(’*’).eq(‘user_id’,user.id).single();
if(sd){
if(sd.appSettings)setAppSettings(p=>({…p,…sd.appSettings}));
// Merge agenda: use Supabase if newer than localStorage
if(Array.isArray(sd.agenda)&&sd.agenda.length>0){
const localTs=parseInt(localStorage.getItem(‘erza_agenda_ts’)||‘0’);
const supaTs=sd.agenda_ts||0;
if(supaTs>=localTs){setAgendaEvents(sd.agenda);}
}
}
}catch(err){console.error(‘Supabase init error:’,err);}
finally{initializedRef.current=true;setInitializing(false);}
};
load();

// APP WRAPPER + ERROR BOUNDARY
// ═══════════════════════════════════════════════════
const AppWrapper = () => {
const [user,setUser]=useState(null), [loading,setLoading]=useState(true);
useEffect(()=>{
if(!supabaseClient){setLoading(false);return;}
supabaseClient.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setLoading(false);});
const{data:{subscription}}=supabaseClient.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
return()=>subscription.unsubscribe();
},[]);
const onGuest=()=>setUser({id:‘local-guest’,email:‘Invité (Local)’,isGuest:true});
const onLogout=async()=>{if(user?.isGuest)setUser(null);else if(supabaseClient)await supabaseClient.auth.signOut();};
if(loading)return html`<div className="h-screen w-full flex items-center justify-center bg-slate-950 text-teal-400"><${RefreshCw} className="animate-spin" size=${44}/></div>`;
if(!user)return html`<${AuthScreen} onGuest=${onGuest}/>`;
return html`<${MainApp} user=${user} onLogout=${onLogout}/>`;
};

class ErrorBoundary extends window.React.Component {
constructor(p){super(p);this.state={e:null};}
static getDerivedStateFromError(e){return{e};}
reset=()=>this.setState({e:null});
render(){
if(this.state.e)return html` <div className="flex h-screen w-full bg-slate-950 items-center justify-center p-6 text-center"> <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 max-w-md shadow-2xl relative overflow-hidden"> <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-rose-500 to-red-500"></div> <h2 className="text-2xl font-serif font-bold text-white mb-2">Erreur inattendue</h2> <p className="text-xs text-slate-500 mb-6 bg-black/20 p-3 rounded font-mono break-words border border-slate-800">${this.state.e?.toString()||'Erreur'}</p> <button onClick=${this.reset} className="w-full bg-teal-600 hover:bg-teal-500 text-white py-4 rounded-2xl font-bold flex justify-center items-center gap-2"><${RefreshCw} size=${16}/> Recharger</button> </div> </div>`;
return html`<${AppWrapper}/>`;
}
}

createRoot(document.getElementById(‘root’)).render(html`<${ErrorBoundary}/>`);
</script>
