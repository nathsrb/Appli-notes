// --- UTILS & ALGORITHMS ---
const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);
const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

const stripHtml = (htmlText) => {
  if (!htmlText) return '';
  return htmlText.replace(/<br\s*\/?>/gi, ' ').replace(/<\/p>/gi, ' ').replace(/<\/h[1-6]>/gi, ' ').replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
};

const highlightTitle = (title, query) => {
  if (!query || !title) return title;
  try {
    const safeQuery = escapeRegExp(query);
    return title.replace(new RegExp(`(${safeQuery})`, 'gi'), '<mark class="bg-teal-500/40 text-teal-100 rounded px-0.5 shadow-sm">$1</mark>');
  } catch (e) { return title; }
};

const applyHighlightsSafe = (htmlText, query) => {
  if (!query || !htmlText) return htmlText;
  try {
    const safeQuery = escapeRegExp(query);
    const regex = new RegExp(`(${safeQuery})`, 'gi');
    let parts = htmlText.split(/(<[^>]*>)/);
    for (let i = 0; i < parts.length; i++) {
      if (i % 2 === 0 && parts[i].trim() !== '') {
        parts[i] = parts[i].replace(regex, '<mark class="search-hl bg-teal-500/60 text-white rounded px-1 shadow-md">$1</mark>');
      }
    }
    return parts.join('');
  } catch(e) { return htmlText; }
};

const stripHighlightsSafe = (htmlText) => {
  if (!htmlText) return '';
  return htmlText.replace(/<mark class="search-hl[^>]*>(.*?)<\/mark>/gi, '$1');
};

const getSnippet = (plainText, query) => {
  if (!query || !plainText) return null;
  try {
    const lowerText = plainText.toLowerCase();
    const lowerQuery = query.toLowerCase();
    const index = lowerText.indexOf(lowerQuery);
    if (index === -1) return null;
    const windowSize = 25; 
    const start = Math.max(0, index - windowSize);
    const end = Math.min(plainText.length, index + query.length + windowSize);
    let snippet = plainText.substring(start, end);
    if (start > 0) snippet = "..." + snippet;
    if (end < plainText.length) snippet = snippet + "...";
    const safeQuery = escapeRegExp(query);
    return snippet.replace(new RegExp(`(${safeQuery})`, 'gi'), '<mark class="text-teal-100 bg-teal-500/60 px-1 rounded shadow-sm font-bold">$1</mark>');
  } catch(e) { return null; }
};

const extractLinks = (content) => {
  if (!content) return [];
  const links = [];
  const regex1 = /data-link="([^"]+)"/g;
  let match;
  while ((match = regex1.exec(content)) !== null) links.push(match[1]);
  const regex2 = /\[\[(.*?)\]\]/g;
  while ((match = regex2.exec(content)) !== null) links.push(match[1]);
  return [...new Set(links)]; 
};

function useOnClickOutside(ref, handler) {
  useEffect(() => {
    const listener = (event) => {
      if (!ref.current || ref.current.contains(event.target)) return;
      handler(event);
    };
    document.addEventListener('mousedown', listener);
    document.addEventListener('touchstart', listener);
    return () => {
      document.removeEventListener('mousedown', listener);
      document.removeEventListener('touchstart', listener);
    };
  }, [ref, handler]);
}

// --- AGENDA COMPONENT ---
const SimpleAgenda = ({ agendaEvents, updateAgendaEvents }) => {
  const safeEvents = Array.isArray(agendaEvents) ? agendaEvents : [];

  const addEvent = (day) => {
    const newEvent = { id: generateId(), day, title: '', time: '', color: MATRIX_COLORS[0].class };
    updateAgendaEvents([...safeEvents, newEvent]);
  };

  const updateEvent = (id, field, value) => {
    updateAgendaEvents(safeEvents.map(e => e.id === id ? { ...e, [field]: value } : e));
  };

  const deleteEvent = (id) => updateAgendaEvents(safeEvents.filter(e => e.id !== id));

  return html`
    <div className="w-full h-full overflow-x-auto overflow-y-auto bg-slate-950 p-4 sm:p-6 custom-scrollbar flex gap-4 items-start">
      ${WEEK_DAYS.map(day => html`

              return html`
                <div key=${ev.id} className=${`p-4 rounded-2xl border flex flex-col gap-2 group transition-all shadow-sm ${ev.color || MATRIX_COLORS[0].class}`}>
                  <div className="text-[10px] font-bold uppercase tracking-wider opacity-90 mb-1 flex items-center gap-1.5">

                      type="text" placeholder="ex: 10h00 - 12h00" value=${ev.time || ''} onChange=${(e) => updateEvent(ev.id, 'time', e.target.value)}

                  <textarea

                    className="bg-transparent outline-none resize-none text-[15px] font-sans min-h-[50px] custom-scrollbar text-slate-100 placeholder-slate-500 leading-relaxed mt-1"
                  ></textarea>
                  <div className="grid grid-cols-2 gap-2 mt-2 pt-3 border-t border-slate-700/50">
                    ${MATRIX_COLORS.map(m => {
                      const isSelected = (ev.color || MATRIX_COLORS[0].class) === m.class;
                      return html`
                        <button 
                          key=${m.bg} 
                          onClick=${() => updateEvent(ev.id, 'color', m.class)} 
                          className=${`flex flex-col items-center justify-center py-2 px-1 rounded-lg border transition-all ${isSelected ? `${m.bg} border-transparent text-white shadow-md` : 'bg-black/20 border-slate-700/50 text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}

// --- RECUPERATION MOT DE PASSE (LOCAL) ---
const PasswordPrompt = ({ note, onUnlock }) => {
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState(false);
  const [recoveryMode, setRecoveryMode] = useState(false);
  const [recoveryCodeInput, setRecoveryCodeInput] = useState('');

  useEffect(() => { setPwd(''); setErr(false); setRecoveryMode(false); setRecoveryCodeInput(''); }, [note.id]);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (pwd === note.lockPassword) onUnlock(note.id, false);
    else { setErr(true); setPwd(''); }
  };

  const handleRecoverySubmit = (e) => {
    e.preventDefault();
    if (recoveryCodeInput === '0000') {
       onUnlock(note.id, true);
    } else {
       alert('Code invalide.');
    }
  };

  const startRecovery = () => {
    alert("Mode local : Un code maître d'urgence a été défini pour éviter la perte de données.\n\nLe code est : 0000");
    setRecoveryMode(true);
  };

  if (recoveryMode) {
    return html`
      <div className="flex-1 flex flex-col items-center justify-center text-slate-500 px-4 font-sans bg-slate-950">
        <form onSubmit=${handleRecoverySubmit} className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl flex flex-col items-center text-center max-w-sm w-full relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-amber-500 to-orange-500"></div>
          <h2 className="text-2xl font-serif font-bold text-white mb-2 mt-4">Récupération</h2>
          <p className="text-sm text-slate-400 mb-6 font-medium">Entrez le code de sécurité maître</p>
          
          <input type="text" value=${recoveryCodeInput} onChange=${(e) => setRecoveryCodeInput(e.target.value)} required
            className="w-full bg-slate-950 border border-slate-700 text-white rounded-xl px-4 py-3.5 outline-none focus:border-amber-500 text-center tracking-[0.5em] font-mono mb-4 text-xl shadow-inner" placeholder="----" autoFocus=${true} />
          
          <button type="submit" className="w-full bg-amber-600 hover:bg-amber-500 text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-amber-500/20">Valider le code</button>
          <button type="button" onClick=${() => setRecoveryMode(false)} className="mt-4 text-xs text-slate-500 hover:text-slate-300">Annuler</button>
        </form>
      </div>
    `;
  }

  return html`
    <div className="flex-1 flex flex-col items-center justify-center text-slate-500 px-4 font-sans bg-slate-950">
      <form onSubmit=${handleSubmit} className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl flex flex-col items-center text-center max-w-sm w-full relative overflow-hidden">
        <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-rose-500 to-red-500"></div>
        <div className="bg-rose-500/10 p-4 rounded-full mb-6 text-rose-500 border border-rose-500/20 mt-4">
          <${Lock} size=${32} />
        </div>
        <h2 className="text-2xl font-serif font-bold text-white mb-2">Note Sécurisée</h2>
        <p className="text-sm text-slate-400 mb-8 font-medium">L'accès à "${note.title}" est protégé.</p>
        
        <input 
          type="password" value=${pwd} onChange=${(e) => {setPwd(e.target.value); setErr(false);}} 
          className=${`w-full bg-slate-950 border ${err ? 'border-rose-500 text-rose-400' : 'border-slate-700 text-white'} rounded-xl px-4 py-3.5 outline-none focus:border-teal-500 text-center tracking-[0.3em] font-mono mb-2 shadow-inner`}
          placeholder="••••••••" autoFocus=${true}
        />
        <div className="h-6">
          ${err ? html`<p className="text-xs text-rose-500 font-bold animate-pulse">Mot de passe incorrect</p>` : null}
        </div>
        
        <button type="submit" className="w-full mt-2 bg-teal-600 hover:bg-teal-500 text-white py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-teal-500/20">
          <${Unlock} size=${18} /> Déverrouiller
        </button>

        <button type="button" onClick=${startRecovery} className="mt-6 text-xs text-slate-500 hover:text-teal-400 transition-colors underline underline-offset-2">
          Mot de passe oublié ?
        </button>
      </form>
    </div>
  `;
}

// --- GLOBAL GRAPH VIEW ---
const GraphView = ({ notes, onNodeClick, unlockedNotes, onExit }) => {
  const canvasRef = useRef(null);
  
  const { nodes, edges } = useMemo(() => {
    const nodesList = [];
    const edgesList = [];
    
    notes.filter(n => !n.isDeleted).forEach(n => { 
      nodesList.push({ 
        id: n.id, title: n.title, type: n.type || 'note', folder: n.folder || 'Général',
        isLocked: n.isLocked && !unlockedNotes.has(n.id), x: Math.random() * 800, y: Math.random() * 600, vx: 0, vy: 0, mass: 1
      }); 
    });

    for (let i = 0; i < nodesList.length; i++) {
      const noteA = notes.find(n => n.id === nodesList[i].id);
      if (!noteA) continue;

      for (let j = i + 1; j < nodesList.length; j++) {
        const noteB = notes.find(n => n.id === nodesList[j].id);
        if (!noteB) continue;

        let linkStrength = 0;
        let linkType = 'none';

        if (noteA.folder && noteB.folder && noteA.folder === noteB.folder && noteA.folder !== 'Général') {
          linkStrength = 0.2; linkType = 'folder';
        }

        if (noteB.title && noteB.title.length > 3 && noteA.plainText && !nodesList[i].isLocked) {
           const regex = new RegExp(`(?:^|\\W)${escapeRegExp(noteB.title)}(?:$|\\W)`, 'i');
           if (regex.test(noteA.plainText)) { linkStrength = 0.6; linkType = 'implicit'; }
        }
        if (noteA.title && noteA.title.length > 3 && noteB.plainText && !nodesList[j].isLocked) {
           const regex = new RegExp(`(?:^|\\W)${escapeRegExp(noteA.title)}(?:$|\\W)`, 'i');
           if (regex.test(noteB.plainText)) { linkStrength = 0.6; linkType = 'implicit'; }
        }

        if (!nodesList[i].isLocked) {
           const linksA = extractLinks(noteA.content);
           if (linksA.some(l => l.toLowerCase() === (noteB.title||'').toLowerCase())) { linkStrength = 1.0; linkType = 'explicit'; }
        }
        if (!nodesList[j].isLocked) {
           const linksB = extractLinks(noteB.content);
           if (linksB.some(l => l.toLowerCase() === (noteA.title||'').toLowerCase())) { linkStrength = 1.0; linkType = 'explicit'; }
        }

        if (linkStrength > 0) {
           edgesList.push({ source: noteA.id, target: noteB.id, strength: linkStrength, type: linkType });
           if (linkType === 'explicit') { nodesList[i].mass += 0.5; nodesList[j].mass += 0.5; }
        }
      }
    }
    return { nodes: nodesList, edges: edgesList };
  }, [notes, unlockedNotes]);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animationFrameId;

    const resizeCanvas = () => { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; };
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    const simulate = () => {
      const damping = 0.8; const k = 0.05; const repulsion = 8000; const idealLength = 200;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const n1 = nodes[i], n2 = nodes[j];
          const dx = n1.x - n2.x, dy = n1.y - n2.y;
          let distance = Math.sqrt(dx * dx + dy * dy) || 1;
          const force = repulsion / (distance * distance);
          const fx = (dx / distance) * force, fy = (dy / distance) * force;
          n1.vx += fx / n1.mass; n1.vy += fy / n1.mass; 
          n2.vx -= fx / n2.mass; n2.vy -= fy / n2.mass;
        }
      }
      edges.forEach(edge => {
        const n1 = nodes.find(n => n.id === edge.source), n2 = nodes.find(n => n.id === edge.target);
        if (!n1 || !n2) return;
        const dx = n2.x - n1.x, dy = n2.y - n1.y;
        const distance = Math.sqrt(dx * dx + dy * dy) || 1;
        const specificIdealLength = idealLength * (1.2 - edge.strength); 
        const force = (distance - specificIdealLength) * k * edge.strength;
        const fx = (dx / distance) * force, fy = (dy / distance) * force;
        n1.vx += fx; n1.vy += fy; n2.vx -= fx; n2.vy -= fy;
      });
      const centerX = canvas.width / 2, centerY = canvas.height / 2;
      nodes.forEach(n => {
        n.vx += (centerX - n.x) * 0.015; n.vy += (centerY - n.y) * 0.015;
        n.x += n.vx; n.y += n.vy;
        n.vx *= damping; n.vy *= damping;
      });
    };

    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      edges.forEach(edge => {
        const n1 = nodes.find(n => n.id === edge.source), n2 = nodes.find(n => n.id === edge.target);
        if (!n1 || !n2) return;
        ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y); 
        
        if (edge.type === 'explicit') { ctx.strokeStyle = 'rgba(20, 184, 166, 0.6)'; ctx.lineWidth = 2; ctx.setLineDash([]); } 
        else if (edge.type === 'implicit') { ctx.strokeStyle = 'rgba(168, 85, 247, 0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([]); } 
        else if (edge.type === 'folder') { ctx.strokeStyle = 'rgba(59, 130, 246, 0.3)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]); }
        ctx.stroke();
      });
      ctx.setLineDash([]); 

      nodes.forEach(node => {
        ctx.beginPath();
        const radius = node.mass > 1 ? 16 : 12; 
        if (node.isLocked) { ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI); ctx.fillStyle = '#f43f5e'; } 
        else if (node.type === 'mindmap') { ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI); ctx.fillStyle = '#f59e0b'; } 
        else { ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI); ctx.fillStyle = '#14b8a6'; }
        ctx.fill(); ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 3; ctx.stroke();
        
        ctx.fillStyle = '#f8fafc'; ctx.font = '12px ui-sans-serif, system-ui, sans-serif'; ctx.textAlign = 'center';
        const displayTitle = node.isLocked ? `🔒 ${node.title}` : node.title;
        const textWidth = ctx.measureText(displayTitle).width;
        ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
        ctx.roundRect(node.x - textWidth/2 - 6, node.y + radius + 4, textWidth + 12, 20, 4); ctx.fill();
        ctx.fillStyle = '#e2e8f0'; ctx.fillText(displayTitle, node.x, node.y + radius + 18);
      });
    };

    const loop = () => { simulate(); draw(); animationFrameId = requestAnimationFrame(loop); };
    loop();

    const handleClick = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clickX = e.clientX - rect.left, clickY = e.clientY - rect.top;
      const clickedNode = nodes.find(n => {
         const radius = n.mass > 1 ? 16 : 12;
         return Math.sqrt(Math.pow(clickX - n.x, 2) + Math.pow(clickY - n.y, 2)) < radius + 10;
      });
      if (clickedNode) onNodeClick(clickedNode);
    };
    canvas.addEventListener('click', handleClick);

    return () => {
      window.removeEventListener('resize', resizeCanvas);
      cancelAnimationFrame(animationFrameId);
      canvas.removeEventListener('click', handleClick);
    };
  }, [nodes, edges, onNodeClick, unlockedNotes]);

  return html`
    <div className="w-full h-full relative overflow-hidden bg-slate-950 select-none touch-none" ref=${containerRef}>
      <div className="absolute inset-0 pointer-events-none opacity-[0.03]" style=${{ backgroundSize: `60px 60px`, backgroundImage: `radial-gradient(circle, #14b8a6 2px, transparent 2px)` }}></div>
      
      <div className="absolute top-6 left-6 text-teal-400 font-medium z-10 flex flex-col gap-2 bg-slate-900/90 px-4 py-3 rounded-2xl border border-slate-800 backdrop-blur shadow-2xl text-sm pointer-events-none">
        <div className="flex items-center gap-2 mb-1 text-white font-bold"><${Network} size=${16} /> Graphe Cérébral</div>
        <div className="flex items-center gap-2 text-slate-400"><div className="w-6 h-[2px] bg-teal-500"></div> Mentions Directes [[ ]]</div>
        <div className="flex items-center gap-2 text-slate-400"><div className="w-6 h-[2px] bg-purple-500"></div> Mentions Implicites</div>
      </div>
      
      <div className="absolute bottom-8 right-8 z-50 flex flex-col gap-3">
        <button onClick=${onExit} className="bg-rose-600 p-3 rounded-full shadow-lg border border-rose-500 text-white hover:bg-rose-500 transition-all mt-4"><${X} size=${24}/></button>
      </div>

      <canvas ref=${canvasRef} className="w-full h-full cursor-grab active:cursor-grabbing" />
    </div>
  `;
};

// --- MIND MAP ENGINE (AVEC FOLD/UNFOLD ET ZOOM) ---
const MindMapCanvas = ({ note, updateNote, navigateToLink, searchQuery, onExit }) => {
  const containerRef = useRef(null);
  const [camera, setCamera] = useState({ x: 100, y: window.innerHeight / 3, zoom: 0.8 });
  const [selection, setSelection] = useState('root');
  const [editingNodeId, setEditingNodeId] = useState(null);
  
  const dragState = useRef({ type: null }); 
  const pinchState = useRef({ initialDist: 0, initialZoom: 1 });

  const [nodes, setNodes] = useState(() => {
    try {
      const parsed = JSON.parse(note?.content || '[]');
      if (Array.isArray(parsed) && parsed.length > 0) {
        if (!parsed.find(n => n.id === 'root')) parsed[0].id = 'root';
        return parsed.map(n => ({...n, isCollapsed: n.isCollapsed || false}));
      }
    } catch (e) {}
    return [{ id: 'root', parentId: null, text: 'Idée Centrale', isCollapsed: false }];
  });

  useEffect(() => {
    const timer = setTimeout(() => {
      const plainText = nodes.map(n => n.text).join(' ');
      updateNote(note.id, { content: JSON.stringify(nodes), plainText });
    }, 500);
    return () => clearTimeout(timer);
  }, [nodes, note.id, updateNote]);

  const visibleNodes = useMemo(() => {
    const visible = [];
    const childrenMap = {};
    nodes.forEach(n => childrenMap[n.id] = []);
    nodes.forEach(n => { if (n.parentId && childrenMap[n.parentId]) childrenMap[n.parentId].push(n); });

    const traverse = (n) => {
      visible.push(n);
      if (!n.isCollapsed) {
        (childrenMap[n.id] || []).forEach(child => traverse(child));
      }
    };
    const root = nodes.find(n => n.id === 'root') || nodes[0];
    if (root) traverse(root);
    return visible;
  }, [nodes]);

  const toggleCollapse = (nodeId) => {
    setNodes(prev => prev.map(n => n.id === nodeId ? { ...n, isCollapsed: !n.isCollapsed } : n));
  };

  const layout = useMemo(() => {
    try {
      const W = 220; const H = 60; const gapX = 90; const gapY = 30;
      const childrenMap = {};
      visibleNodes.forEach(n => childrenMap[n.id] = []);
      visibleNodes.forEach(n => { if (n.parentId && childrenMap[n.parentId]) childrenMap[n.parentId].push(n.id); });

      const root = visibleNodes.find(n => n.id === 'root') || visibleNodes[0];
      if (!root) return { positions: {} };

      const nodeSizes = {};
      const calcSubtreeHeight = (nodeId) => {
        const children = childrenMap[nodeId] || [];
        if (children.length === 0) { nodeSizes[nodeId] = H; return H; }
        let totalHeight = 0;
        for (let childId of children) totalHeight += calcSubtreeHeight(childId);
        totalHeight += (children.length - 1) * gapY;
        nodeSizes[nodeId] = Math.max(H, totalHeight);
        return nodeSizes[nodeId];
      };
      calcSubtreeHeight(root.id);

      const positions = {};
      const assignCoordinates = (nodeId, x, centerY, depth) => {
        const isRoot = depth === 0;
        const nodeWidth = isRoot ? 260 : W;
        positions[nodeId] = { x, y: centerY - (H / 2), width: nodeWidth, height: H, depth };

        const children = childrenMap[nodeId] || [];
        if (children.length === 0) return;
        let startY = centerY - (nodeSizes[nodeId] / 2);
        for (let childId of children) {
          let childSubtreeHeight = nodeSizes[childId];
          let childCenterY = startY + (childSubtreeHeight / 2);
          assignCoordinates(childId, x + nodeWidth + gapX, childCenterY, depth + 1);
          startY += childSubtreeHeight + gapY;
        }
      };
      assignCoordinates(root.id, 0, 0, 0);
      return { positions, childrenMap };
    } catch (error) { return { positions: {} }; }
  }, [visibleNodes]);

  const addNode = (parentId) => {
    if (!parentId) return;
    const newNode = { id: generateId(), parentId, text: '', isCollapsed: false };
    setNodes(prev => [...prev.map(n => n.id === parentId ? {...n, isCollapsed: false} : n), newNode]); 
    setSelection(newNode.id); 
    setEditingNodeId(newNode.id);
  };

  const addSibling = (currentNodeId) => {
    const currentNode = nodes.find(n => n.id === currentNodeId);
    if (!currentNode || !currentNode.parentId) return;
    const newNode = { id: generateId(), parentId: currentNode.parentId, text: '', isCollapsed: false };
    setNodes(prev => [...prev, newNode]); setSelection(newNode.id); setEditingNodeId(newNode.id);
  };

  const deleteNode = (nodeId) => {
    const currentNode = nodes.find(n => n.id === nodeId);
    if (!currentNode || !currentNode.parentId) return;
    const toDelete = new Set([nodeId]);
    const findChildren = (id) => { nodes.filter(n => n.parentId === id).forEach(c => { toDelete.add(c.id); findChildren(c.id); }); };
    findChildren(nodeId);
    setNodes(prev => prev.filter(n => !toDelete.has(n.id)));
    setSelection(currentNode.parentId); 
  };

  const handleWheel = (e) => {
    e.preventDefault();
    if (e.ctrlKey || e.metaKey || e.deltaY % 1 !== 0) { 
      const newZoom = Math.min(Math.max(0.2, camera.zoom + (-e.deltaY * 0.005)), 3);
      const rect = containerRef.current.getBoundingClientRect();
      const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
      setCamera({ x: mouseX - (mouseX - camera.x) * (newZoom / camera.zoom), y: mouseY - (mouseY - camera.y) * (newZoom / camera.zoom), zoom: newZoom });
    } else { 
      setCamera(c => ({ ...c, x: c.x - e.deltaX, y: c.y - e.deltaY }));
    }
  };

  const getTouchDistance = (touches) => Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
  const getTouchCenter = (touches, rect) => ({ x: ((touches[0].clientX + touches[1].clientX) / 2) - rect.left, y: ((touches[0].clientY + touches[1].clientY) / 2) - rect.top });

  const onTouchStart = (e) => {
    if (editingNodeId) return;
    if (e.touches.length === 1) {
      dragState.current = { type: 'pan', startX: e.touches[0].clientX, startY: e.touches[0].clientY, initCamX: camera.x, initCamY: camera.y };
      setSelection(null);
    } else if (e.touches.length === 2) {
      dragState.current = { type: 'pinch' };
      pinchState.current = { initialDist: getTouchDistance(e.touches), initialZoom: camera.zoom };
    }
  };

  const onTouchMove = (e) => {
    if (editingNodeId) return;
    if (e.touches.length === 1 && dragState.current.type === 'pan') {
      setCamera({ ...camera, x: dragState.current.initCamX + (e.touches[0].clientX - dragState.current.startX), y: dragState.current.initCamY + (e.touches[0].clientY - dragState.current.startY) });
    } else if (e.touches.length === 2 && dragState.current.type === 'pinch') {
      const scale = getTouchDistance(e.touches) / pinchState.current.initialDist;
      const newZoom = Math.min(Math.max(0.2, pinchState.current.initialZoom * scale), 3);
      if (containerRef.current) {
        const center = getTouchCenter(e.touches, containerRef.current.getBoundingClientRect());
        setCamera({ x: center.x - (center.x - camera.x) * (newZoom / camera.zoom), y: center.y - (center.y - camera.y) * (newZoom / camera.zoom), zoom: newZoom });
      }
    }
  };

  const handlePointerDown = (e) => {
    if (e.pointerType === 'touch' || editingNodeId) return; 
    if (e.target === containerRef.current || e.target.tagName === 'svg') {
      dragState.current = { type: 'pan', startX: e.clientX, startY: e.clientY, initCamX: camera.x, initCamY: camera.y };
      setSelection(null);
    }
  };

  const handlePointerMove = (e) => {
    if (e.pointerType === 'touch') return;
    if (dragState.current.type === 'pan') {
      setCamera({ ...camera, x: dragState.current.initCamX + (e.clientX - dragState.current.startX), y: dragState.current.initCamY + (e.clientY - dragState.current.startY) });
    }
  };

  const drawEdges = () => {
    const paths = [];
    visibleNodes.forEach(node => {
      if (!node.parentId) return;
      const pPos = layout.positions[node.parentId]; const cPos = layout.positions[node.id];
      if (!pPos || !cPos) return;
      const startX = pPos.x + pPos.width; const startY = pPos.y + (pPos.height / 2);
      const endX = cPos.x; const endY = cPos.y + (cPos.height / 2);
      const midX = startX + (endX - startX) / 2;
      paths.push(html`<path key=${`e_${node.id}`} d=${`M ${startX} ${startY} C ${midX} ${startY}, ${midX} ${endY}, ${endX} ${endY}`} fill="none" stroke=${pPos.depth === 0 ? "#14b8a6" : "#475569"} strokeWidth=${pPos.depth === 0 ? "3" : "2"} strokeOpacity="0.8" />`);
    });
    return paths;
  };

  const renderNodeText = (text) => {
    if (!text) return html`<span className="opacity-40 italic font-normal">Idée...</span>`;
    let displayedText = text;
    if (searchQuery) displayedText = highlightTitle(text, searchQuery);
    
    const parts = displayedText.split(/(\[\[.*?\]\])/g);
    return parts.map((part, i) => {
      const match = part.match(/\[\[(.*?)\]\]/);
      if (match) {
        const linkDest = match[1].replace(/<mark[^>]*>|<\/mark>/g, '');
        return html`<span key=${i} className="text-teal-300 font-bold underline cursor-pointer hover:text-white" onClick=${(e) => { e.stopPropagation(); navigateToLink(linkDest); }} dangerouslySetInnerHTML=${{__html: part}}></span>`;
      }
      return html`<span key=${i} dangerouslySetInnerHTML=${{__html: part}}></span>`;
    });
  };

  return html`
    <div className="w-full h-full relative overflow-hidden bg-slate-950 select-none touch-none" ref=${containerRef} onWheel=${handleWheel} onPointerDown=${handlePointerDown} onPointerMove=${handlePointerMove} onPointerUp=${() => {dragState.current.type=null}} onPointerLeave=${() => {dragState.current.type=null}} onTouchStart=${onTouchStart} onTouchMove=${onTouchMove} onTouchEnd=${() => {dragState.current.type=null}} onTouchCancel=${() => {dragState.current.type=null}}>
      <div className="absolute inset-0 pointer-events-none opacity-[0.03]" style=${{ backgroundSize: `${60 * camera.zoom}px ${60 * camera.zoom}px`, backgroundImage: `radial-gradient(circle, #14b8a6 2px, transparent 2px)`, backgroundPosition: `${camera.x}px ${camera.y}px` }}></div>
      
      <div className="absolute bottom-8 right-8 z-50 flex flex-col gap-3">
        <button onClick=${() => setCamera(c => ({...c, zoom: Math.min(3, c.zoom + 0.2)}))} className="bg-slate-800 p-3 rounded-full shadow-lg border border-slate-700 text-slate-300 hover:text-white hover:bg-slate-700 transition-all"><${ZoomIn} size=${24}/></button>
        <button onClick=${() => setCamera(c => ({...c, zoom: Math.max(0.2, c.zoom - 0.2)}))} className="bg-slate-800 p-3 rounded-full shadow-lg border border-slate-700 text-slate-300 hover:text-white hover:bg-slate-700 transition-all"><${ZoomOut} size=${24}/></button>
        <button onClick=${() => setCamera({x: containerRef.current?.clientWidth/4 || 100, y: containerRef.current?.clientHeight/2 || 200, zoom: 1})} className="bg-teal-600 p-3 rounded-full shadow-lg shadow-teal-500/30 border border-teal-500 text-white hover:bg-teal-500 transition-all"><${Target} size=${24}/></button>
        <button onClick=${onExit} className="bg-rose-600 p-3 rounded-full shadow-lg border border-rose-500 text-white hover:bg-rose-500 transition-all mt-4"><${X} size=${24}/></button>
      </div>

      ${selection && !editingNodeId ? html`
        <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 z-30 flex gap-3 bg-slate-900/95 p-3 rounded-3xl border border-slate-700 shadow-2xl backdrop-blur-lg w-max">
          <button onPointerDown=${(e) => { e.stopPropagation(); setEditingNodeId(selection); }} className="flex flex-col items-center justify-center gap-1.5 w-[65px] h-[60px] sm:w-20 sm:h-16 text-white bg-slate-800 hover:bg-slate-700 rounded-2xl transition-all shadow-md hover:text-teal-300"><${Edit3} size=${18}/><span className="text-[10px] font-bold tracking-wide">ÉDITER</span></button>
          <button onPointerDown=${(e) => { e.stopPropagation(); addNode(selection); }} className="flex flex-col items-center justify-center gap-1.5 w-[75px] h-[60px] sm:w-24 sm:h-16 text-white bg-teal-600 hover:bg-teal-500 rounded-2xl transition-all shadow-md shadow-teal-500/20"><${CornerDownRight} size=${18}/><span className="text-[10px] font-bold tracking-wide">ENFANT</span></button>
          ${selection !== 'root' ? html`<button onPointerDown=${(e) => { e.stopPropagation(); addSibling(selection); }} className="flex flex-col items-center justify-center gap-1.5 w-[80px] h-[60px] sm:w-24 sm:h-16 text-slate-200 bg-slate-800 hover:bg-slate-700 rounded-2xl transition-all shadow-md hover:text-teal-300"><${AlignLeft} size=${18}/><span className="text-[10px] font-bold tracking-wide">FRÈRE</span></button>` : null}
          ${selection !== 'root' ? html`<button onPointerDown=${(e) => { e.stopPropagation(); deleteNode(selection); }} className="flex flex-col items-center justify-center gap-1.5 w-[65px] h-[60px] sm:w-20 sm:h-16 text-rose-200 bg-rose-500/20 hover:bg-rose-500/40 rounded-2xl transition-all shadow-md"><${Trash2} size=${18}/><span className="text-[10px] font-bold tracking-wide">SUPPR</span></button>` : null}
        </div>
      ` : null}
      
      <div className="absolute inset-0 origin-top-left" style=${{ transform: `translate(${camera.x}px, ${camera.y}px) scale(${camera.zoom})` }}>
        <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible z-0">${drawEdges()}</svg>
        ${visibleNodes.map(node => {
          const pos = layout.positions[node.id];
          if (!pos) return null;
          const isSelected = selection === node.id; 
          const isEditing = editingNodeId === node.id; 
          const isRoot = pos.depth === 0;
          const hasChildrenInRealState = nodes.some(n => n.parentId === node.id);
          
          let nodeClass = "absolute flex items-center p-4 sm:p-5 transition-all cursor-pointer border-2 z-10 overflow-visible ";
          if (isRoot) {
            nodeClass += "bg-gradient-to-br from-teal-600 to-emerald-700 border-teal-400 rounded-[50px] justify-center text-center shadow-[0_0_30px_rgba(20,184,166,0.3)] ";
            nodeClass += isSelected ? "ring-4 ring-teal-300/40 scale-105" : "hover:scale-105";
          } else {
            nodeClass += "bg-slate-800/95 border-slate-600 rounded-2xl justify-start shadow-xl backdrop-blur-sm ";
            nodeClass += isSelected ? "border-teal-400 ring-2 ring-teal-400/20 scale-105" : "hover:border-slate-400 hover:bg-slate-700";
          }

          return html`
            <div key=${node.id} onPointerDown=${(e) => { e.stopPropagation(); setSelection(node.id); if(editingNodeId !== node.id) setEditingNodeId(null); }} onDoubleClick=${(e) => { e.stopPropagation(); setEditingNodeId(node.id); setSelection(node.id); }} className=${nodeClass} style=${{ transform: `translate(${pos.x}px, ${pos.y}px)`, width: pos.width, minHeight: pos.height }}>
              ${isEditing ? html`
                <textarea 
                  autoFocus=${true}
                  className=${`w-full h-full bg-transparent text-white outline-none resize-none custom-scrollbar p-1 ${isRoot ? 'text-xl text-center font-serif font-bold' : 'text-base font-sans font-medium'}`} 
                  value=${node.text || ''} 
                  onChange=${(e) => setNodes(nodes.map(n => n.id === node.id ? { ...n, text: e.target.value } : n))} 
                  onPointerDown=${(e) => e.stopPropagation()} 
                  onBlur=${() => setEditingNodeId(null)} 
                  onKeyDown=${(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); setEditingNodeId(null); } }} 
                  style=${{ whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}
                />
              ` : html`
                <div className=${`text-white w-full flex items-center leading-snug ${isRoot ? 'text-lg sm:text-xl justify-center font-serif font-bold tracking-wide' : 'text-[15px] font-sans font-medium'}`} style=${{ whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
                  ${renderNodeText(node.text)}
                </div>
              `}

              ${hasChildrenInRealState ? html`
                <div 
                  onPointerDown=${(e) => { e.stopPropagation(); toggleCollapse(node.id); }}
                  className="absolute -right-3.5 top-1/2 transform -translate-y-1/2 w-7 h-7 bg-slate-700 rounded-full border border-slate-500 text-white flex items-center justify-center cursor-pointer hover:bg-teal-500 hover:border-teal-400 z-50 text-xl font-bold shadow-lg"
                >
                  ${node.isCollapsed ? '+' : '−'}
                </div>
              ` : null}
            </div>
          `;
        })}
      </div>
    </div>
  `;
};

// --- WYSIWYG EDITOR COMPONENT (AVEC THEME CLAIR) ---
const RichTextEditor = ({ note, updateNote, appSettings, navigateToLink, searchQuery }) => {
  const editorRef = useRef(null);
  const [isFocused, setIsFocused] = useState(false);
  const savedSelection = useRef(null); 
  const prevNoteId = useRef(note.id);
  const prevSearch = useRef(searchQuery);

  const isLight = appSettings?.theme === 'light';
  const containerBg = isLight ? 'bg-slate-50' : 'bg-slate-950';
  const toolbarBg = isLight ? 'bg-slate-200 border-slate-300' : 'bg-slate-900 border-slate-800';
  const btnClass = isLight ? 'text-slate-600 hover:text-slate-900 hover:bg-slate-300' : 'text-slate-400 hover:text-white hover:bg-slate-800';
  const selectBg = isLight ? 'bg-slate-100 border-slate-300 text-slate-800' : 'bg-slate-950 border-slate-700 text-slate-300';
  const dividerClass = isLight ? 'bg-slate-300' : 'bg-slate-700';

  useEffect(() => {
    if (!editorRef.current) return;
    const noteChanged = note.id !== prevNoteId.current;
    const searchChanged = searchQuery !== prevSearch.current;
    let rawHtml = editorRef.current.innerHTML;
    let strippedRaw = stripHighlightsSafe(rawHtml);
    const isDesynced = !isFocused && strippedRaw !== note.content && note.content;

    if (noteChanged || searchChanged || isDesynced) {
      let htmlText = note.content || '<h1>Nouvelle Note</h1><p><br></p>';
      if (searchQuery && !isFocused) htmlText = applyHighlightsSafe(htmlText, searchQuery);
      editorRef.current.innerHTML = htmlText;

      if (searchQuery && !isFocused) {
        setTimeout(() => {
          if (editorRef.current) {
            const mark = editorRef.current.querySelector('mark.search-hl');
            if (mark) mark.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 50);
      }
      prevNoteId.current = note.id; prevSearch.current = searchQuery;
    }
  }, [note.id, note.content, searchQuery, isFocused]);

  const handleInput = useCallback(() => {
    if (editorRef.current) {
      let rawHtml = editorRef.current.innerHTML;
      if (rawHtml.includes('search-hl')) rawHtml = stripHighlightsSafe(rawHtml);
      updateNote(note.id, { content: rawHtml, plainText: stripHtml(rawHtml) });
    }
  }, [updateNote, note.id]);

  const handleFocus = () => {
    setIsFocused(true);
    if (editorRef.current && editorRef.current.innerHTML.includes('search-hl')) {
      editorRef.current.innerHTML = stripHighlightsSafe(editorRef.current.innerHTML);
    }
  };

  const handleBlur = () => { setIsFocused(false); handleInput(); };

  const saveSelection = () => {
    const sel = window.getSelection();
    if (sel.getRangeAt && sel.rangeCount) savedSelection.current = sel.getRangeAt(0);
  };

  const execCmd = (e, command, value = null) => {
    if (e) e.preventDefault(); 
    if (editorRef.current) {
      editorRef.current.focus();
      if (savedSelection.current) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedSelection.current);
      }
    }
    if (command === 'formatBlock') document.execCommand(command, false, `<${value}>`);
    else document.execCommand(command, false, value);
    handleInput();
  };

  const handleEditorClick = (e) => {
    if (e.target && e.target.classList.contains('ezra-cb')) {
      if (e.target.hasAttribute('checked')) e.target.removeAttribute('checked');
      else e.target.setAttribute('checked', 'checked');
      handleInput();
    }
    if (e.target && e.target.classList.contains('internal-link')) {
       e.preventDefault();
       const linkDest = e.target.getAttribute('data-link');
       if (linkDest) navigateToLink(linkDest);
    }
  };

  const insertCheckbox = (e) => {
    e.preventDefault();
    if (editorRef.current) editorRef.current.focus();
    document.execCommand('insertHTML', false, '<input type="checkbox" class="ezra-cb" style="margin-right: 8px; transform: scale(1.2); cursor: pointer;" />&nbsp;');
    handleInput();
  };

  const insertInternalLink = (e) => {
    e.preventDefault();
    const linkName = prompt("Nom de la note à lier (Second Cerveau) :");
    if (linkName) {
      if (editorRef.current) editorRef.current.focus();
      if (savedSelection.current) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(savedSelection.current);
      }
      const linkHtml = `<span class="internal-link text-teal-400 bg-teal-500/10 px-1.5 py-0.5 rounded cursor-pointer font-bold hover:bg-teal-500/20 transition-colors border border-teal-500/30" contenteditable="false" data-link="${linkName}">[[${linkName}]]</span>&nbsp;`;
      document.execCommand('insertHTML', false, linkHtml);
      handleInput();
    }
  };

  const fonts = ['Arial', 'Georgia', 'Courier New', 'Verdana', 'Trebuchet MS'];

  return html`
    <div className="flex flex-col w-full h-full bg-slate-950 relative z-0">
      <div onMouseDown=${saveSelection} className=${`h-14 ${toolbarBg} border-b flex items-center px-4 gap-1 sm:gap-2 overflow-x-auto custom-scrollbar shrink-0 shadow-md z-10 w-full`}>
        <button onClick=${(e) => execCmd(e, 'undo')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Annuler"><${Undo} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'redo')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Rétablir"><${Redo} size=${18}/></button>

        <div className=${`w-px h-6 ${dividerClass} mx-1 shrink-0`}></div>

        <select onChange=${(e) => execCmd(e, 'fontName', e.target.value)} className=${`${selectBg} rounded-lg p-1.5 text-xs sm:text-sm outline-none cursor-pointer focus:border-teal-500`}>
          <option value="">Police</option>
          ${fonts.map(f => html`<option key=${f} value=${f}>${f}</option>`)}
        </select>
        <select onChange=${(e) => execCmd(e, 'fontSize', e.target.value)} className=${`${selectBg} rounded-lg p-1.5 text-xs sm:text-sm outline-none cursor-pointer focus:border-teal-500`}>
          <option value="">Taille</option>
          <option value="2">Petit</option>
          <option value="3">Normal</option>
          <option value="5">Grand</option>
          <option value="7">Géant</option>
        </select>
        
        <div className=${`w-px h-6 ${dividerClass} mx-1 shrink-0`}></div>
        
        <button onClick=${(e) => execCmd(e, 'formatBlock', 'H1')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Grand Titre"><${Heading1} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'formatBlock', 'H2')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Sous Titre"><${Heading2} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'formatBlock', 'H3')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Petit Titre"><${Heading3} size=${18}/></button>
        
        <div className=${`w-px h-6 ${dividerClass} mx-1 shrink-0`}></div>
        
        <button onClick=${(e) => execCmd(e, 'bold')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Gras"><${Bold} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'italic')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Italique"><${Italic} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'underline')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Souligné"><${Underline} size=${18}/></button>
        
        <div className=${`w-px h-6 ${dividerClass} mx-1 shrink-0`}></div>
        
        <button onClick=${(e) => execCmd(e, 'insertUnorderedList')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Liste à puces"><${ListIcon} size=${18}/></button>
        <button onClick=${(e) => execCmd(e, 'insertOrderedList')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Liste numérotée"><${ListOrdered} size=${18}/></button>
        <button onClick=${insertCheckbox} className=${`p-2 ${isLight ? 'text-teal-600 hover:bg-teal-100' : 'text-slate-400 hover:text-teal-400 hover:bg-teal-500/10'} rounded-lg transition-colors`} title="Case à cocher"><${CheckSquare} size=${18}/></button>
        
        <div className=${`w-px h-6 ${dividerClass} mx-1 shrink-0`}></div>

        <button onClick=${(e) => execCmd(e, 'formatBlock', 'BLOCKQUOTE')} className=${`p-2 ${btnClass} rounded-lg transition-colors`} title="Citation"><${Quote} size=${18}/></button>
        <button onClick=${insertInternalLink} className="p-2 text-teal-500 hover:text-teal-600 hover:bg-teal-500/20 rounded-lg transition-colors flex items-center gap-1 font-bold text-xs border border-transparent hover:border-teal-500/30" title="Lier une note (Second Cerveau)"><${LinkIcon} size=${16}/> Lien</button>

      </div>

      <div className=${`flex-1 overflow-y-auto custom-scrollbar p-6 md:p-10 lg:px-24 scroll-smooth ${containerBg} relative z-0`}>
        <input 
          type="text" 
          value=${note.title || ''} 
          onChange=${(e) => updateNote(note.id, { title: e.target.value })} 
          className=${`w-full max-w-4xl mx-auto block bg-transparent text-3xl md:text-5xl font-serif font-extrabold mb-6 pb-4 border-b outline-none tracking-tight ${isLight ? 'text-slate-900 border-slate-300 placeholder-slate-400' : 'text-white border-slate-800/50 placeholder-slate-700'}`} 
          placeholder="Titre de la note"
        />
        <div 
          ref=${editorRef}
          contentEditable="true"
          onFocus=${handleFocus}
          onBlur=${handleBlur}
          onInput=${handleInput}
          onClick=${handleEditorClick}
          onKeyUp=${saveSelection}
          onMouseUp=${saveSelection}
          className=${`ezra-editor w-full max-w-4xl mx-auto min-h-[60vh] outline-none pb-32 ${appSettings?.fontSize || 'text-[16px]'} ${appSettings?.lineSpacing || 'leading-relaxed'} ${isLight ? 'light-mode' : 'text-slate-300'}`}
          placeholder="Écrivez vos pensées ici..."
          suppressContentEditableWarning="true"
        ></div>
      </div>
    </div>
  `;
};

// --- MAIN APP ---
function MainApp() {
  const [notes, setNotes] = useState(() => {
    try {
      const localNotesStr = localStorage.getItem('erza_notes');
      if (localNotesStr) {
         const parsed = JSON.parse(localNotesStr);
         if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch(e){}
    return initialNotes;
  });
  
  const [agendaEvents, setAgendaEvents] = useState(() => {
    try {
      const s = localStorage.getItem('erza_settings');
      if (s) { const p = JSON.parse(s); if(Array.isArray(p.agenda)) return p.agenda; }
    } catch(e){}
    return [];
  });
  
  const [appSettings, setAppSettings] = useState(() => {
    const defSettings = { fontFamily: 'font-sans', fontSize: 'text-[16px]', lineSpacing: 'leading-relaxed', theme: 'dark' };
    try {
      const s = localStorage.getItem('erza_settings');
      if (s) { const p = JSON.parse(s); if(p.appSettings) return {...defSettings, ...p.appSettings}; }
    } catch(e){}
    return defSettings;
  });

  const [activeNoteId, setActiveNoteId] = useState(notes.length > 0 ? notes[0].id : null);
  const [viewMode, setViewMode] = useState('editor'); 
  const [searchQuery, setSearchQuery] = useState('');
  const [leftSidebarOpen, setLeftSidebarOpen] = useState(window.innerWidth > 1024); 
  const [rightSidebarOpen, setRightSidebarOpen] = useState(false);
  const [sidebarTab, setSidebarTab] = useState('files'); 

  const [expandedFolders, setExpandedFolders] = useState({ 'Général': true });

  const propertiesRef = useRef(null);
  const lockConfigRef = useRef(null);

  useOnClickOutside(propertiesRef, () => setShowProperties(false));
  useOnClickOutside(lockConfigRef, () => setShowLockConfig(false));

  const [showProperties, setShowProperties] = useState(false);
  const [unlockedNotes, setUnlockedNotes] = useState(new Set());
  const [showLockConfig, setShowLockConfig] = useState(false);
  const [lockPasswordInput, setLockPasswordInput] = useState('');

  useEffect(() => { 
    if (window.innerWidth > 1024) { setLeftSidebarOpen(true); setRightSidebarOpen(true); }
  }, []);

  // SAUVEGARDE LOCALE INSTANTANÉE (100% LOCAL)
  useEffect(() => {
    localStorage.setItem('erza_notes', JSON.stringify(notes));
  }, [notes]);

  useEffect(() => {
    localStorage.setItem('erza_settings', JSON.stringify({ agenda: agendaEvents, appSettings }));
  }, [agendaEvents, appSettings]);

  const activeNote = notes.find(n => n.id === activeNoteId);
  const isNoteLocked = activeNote && activeNote.isLocked && !unlockedNotes.has(activeNote.id);

  const createDocument = (type = 'note', customTitle = null, customContent = null, customFolder = 'Général') => {
    const newDoc = {
      id: generateId(),
      title: customTitle || (type === 'note' ? 'Nouvelle Note' : 'Nouvelle Carte'),
      type: type,
      folder: customFolder,
      content: customContent || (type === 'note' ? '<h1>Nouvelle Note</h1><p><br></p>' : JSON.stringify([{id:'root', parentId: null, text:'', isCollapsed: false}])),
      plainText: type === 'note' ? 'Nouvelle Note' : '',
      isLocked: false,
      lockPassword: '',
      isDeleted: false,
      lastModified: Date.now()
    };
    setNotes(prev => [newDoc, ...prev]);
    setActiveNoteId(newDoc.id);
    setViewMode(type === 'mindmap' ? 'mindmap' : 'editor');
    setExpandedFolders(prev => ({...prev, [customFolder]: true}));
    if (window.innerWidth < 768) setLeftSidebarOpen(false);
  };

  const openDailyNote = () => {
    const dateStr = new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    const formattedTitle = `Journal - ${dateStr.charAt(0).toUpperCase() + dateStr.slice(1)}`;
    const existing = notes.find(n => n.title === formattedTitle && !n.isDeleted);
    
    if (existing) {
      setActiveNoteId(existing.id);
      setViewMode('editor');
    } else {
      createDocument('note', formattedTitle, `<h2>🎯 Focus du jour</h2><ul><li><br></li></ul><h2>📝 Réflexions</h2><p><br></p>`, 'Journal');
    }
    setSidebarTab('files');
    if (window.innerWidth < 768) setLeftSidebarOpen(false);
  };

  const updateNoteById = useCallback((id, updates) => {
    setNotes(prevNotes => prevNotes.map(note => {
      if (note.id === id && !note.isDeleted) {
        const updatedNote = { ...note, ...updates, lastModified: Date.now() };
        if (updates.content !== undefined && updates.plainText === undefined) {
           if (note.type !== 'mindmap') {
              updatedNote.plainText = stripHtml(updates.content);
           }
        }
        return updatedNote;
      }
      return note;
    }));
  }, []);

  const deleteNote = (id) => {
    setNotes(prevNotes => prevNotes.map(note => note.id === id ? { ...note, isDeleted: true, lastModified: Date.now() } : note));
    if (activeNoteId === id) setActiveNoteId(null);
  };
  
  const restoreNote = (id) => {
    setNotes(prevNotes => prevNotes.map(note => note.id === id ? { ...note, isDeleted: false, lastModified: Date.now() } : note));
  };

  const permanentDeleteNote = (id) => {
    setNotes(prevNotes => prevNotes.filter(n => n.id !== id));
    if (activeNoteId === id) setActiveNoteId(null);
  };

  const navigateToLink = (titleQuery) => {
    const queryStr = (titleQuery || '').toLowerCase();
    const existingNote = notes.find(n => (n.title || '').toLowerCase() === queryStr && !n.isDeleted);
    if (existingNote) {
      if (existingNote.isLocked && !unlockedNotes.has(existingNote.id)) { alert("Note verrouillée."); return; }
      setActiveNoteId(existingNote.id);
      setViewMode(existingNote.type === 'mindmap' ? 'mindmap' : 'editor');
    } else {
      createDocument('note', titleQuery, `<h1>${titleQuery}</h1><p><br></p>`);
    }
    if (window.innerWidth < 768) setLeftSidebarOpen(false);
  };

  const handleLockConfig = (e) => {
    e.preventDefault();
    if (!activeNote) return;

    if (activeNote.isLocked) {
      if (lockPasswordInput === activeNote.lockPassword) {
        updateNoteById(activeNote.id, { isLocked: false, lockPassword: '' });
        setLockPasswordInput('');
        setShowLockConfig(false);
      } else {
        alert("Mot de passe incorrect.");
      }
    } else {
      if (lockPasswordInput.length > 0) {
        updateNoteById(activeNote.id, { isLocked: true, lockPassword: lockPasswordInput });
        setLockPasswordInput('');
        setShowLockConfig(false);
      }
    }
  };

  const filteredNotes = useMemo(() => {
    let activeList = notes.filter(n => !n.isDeleted);
    if (!searchQuery) return activeList.sort((a, b) => (b.lastModified || 0) - (a.lastModified || 0));
    const q = searchQuery.toLowerCase();
    return activeList.filter(n => {
      const isSecured = n.isLocked && !unlockedNotes.has(n.id);
      if (isSecured) return (n.title || '').toLowerCase().includes(q);
      return (n.title || '').toLowerCase().includes(q) || (n.plainText || '').toLowerCase().includes(q);
    }).sort((a, b) => (b.lastModified || 0) - (a.lastModified || 0)).slice(0, 100); 
  }, [notes, searchQuery, unlockedNotes]);

  const textNotes = useMemo(() => filteredNotes.filter(n => !n.type || n.type === 'note'), [filteredNotes]);
  const mindmapsList = useMemo(() => filteredNotes.filter(n => n.type === 'mindmap'), [filteredNotes]);
  const trashNotes = useMemo(() => notes.filter(n => n.isDeleted).sort((a, b) => (b.lastModified || 0) - (a.lastModified || 0)), [notes]);

  const folders = useMemo(() => {
    const grouped = {};
    textNotes.forEach(note => {
      const f = note.folder || 'Général';
      if (!grouped[f]) grouped[f] = [];
      grouped[f].push(note);
    });
    return grouped;
  }, [textNotes]);
  
  const allFolderNames = useMemo(() => Object.keys(folders).sort(), [folders]);

  const { explicitBacklinks, implicitBacklinks } = useMemo(() => {
    const explicit = [];
    const implicit = [];
    if (!activeNote || viewMode === 'graph' || viewMode === 'agenda') return { explicitBacklinks: explicit, implicitBacklinks: implicit };
    
    const activeTitleLower = (activeNote.title || '').toLowerCase();
    if (!activeTitleLower) return { explicitBacklinks: explicit, implicitBacklinks: implicit };

    notes.filter(n => !n.isDeleted).forEach(n => {
      if (n.id === activeNote.id) return;
      if (n.isLocked && !unlockedNotes.has(n.id)) return; 

      const explicitLinks = extractLinks(n.content).map(l => l.toLowerCase());
      if (explicitLinks.includes(activeTitleLower)) {
        explicit.push(n);
      } else {
        if (activeNote.title.length > 3 && n.plainText) {
           const regex = new RegExp(`(?:^|\\W)${escapeRegExp(activeNote.title)}(?:$|\\W)`, 'i');
           if (regex.test(n.plainText)) {
              implicit.push(n);
           }
        }
      }
    });
    return { explicitBacklinks: explicit, implicitBacklinks: implicit };
  }, [notes, activeNote, viewMode, unlockedNotes]);

  return html`
    <div className=${`fixed inset-0 flex w-full h-[100dvh] bg-slate-950 text-slate-300 overflow-hidden selection:bg-teal-500/30 ${appSettings.fontFamily}`}>
      
      ${leftSidebarOpen ? html`<div className="absolute inset-0 bg-slate-950/80 z-40 lg:hidden backdrop-blur-sm" onClick=${() => setLeftSidebarOpen(false)}></div>` : null}

      <!-- --- LEFT SIDEBAR --- -->

        <div className="p-5 border-b border-slate-800 flex items-center justify-between shrink-0 bg-slate-900">
          <div className="flex items-center gap-3 font-bold text-white">
            <${Feather} size=${24} className="text-teal-400" />
            <span className="tracking-wide text-xl font-serif">Erza Spark</span>
          </div>
          <div className="flex gap-2">
            <button className="lg:hidden p-2 text-slate-400 hover:text-white bg-slate-800 rounded-xl" onClick=${() => setLeftSidebarOpen(false)}><${X} size=${20} /></button>
          </div>
        </div>

        <!-- ENCART VENDEUR -->
        <div className="px-4 pt-4 mb-2 shrink-0">
           <a href="https://nathansrb7.systeme.io/9123fdf1" target="_blank" rel="noopener noreferrer" className="w-full bg-gradient-to-r from-teal-900/40 to-emerald-900/40 border border-teal-500/30 p-3 rounded-xl flex items-center gap-3 text-teal-100 hover:from-teal-800/50 hover:to-emerald-800/50 hover:border-teal-400 transition-all group shadow-lg shadow-teal-900/20">
             <div className="bg-teal-500/20 p-2 rounded-lg group-hover:bg-teal-400/30 transition-colors text-teal-400"><${Rocket} size=${18} /></div>
             <div className="text-left flex-1">
               <div className="text-[12px] font-bold font-sans uppercase tracking-wide text-teal-300">Maîtriser l'IA</div>
               <div className="text-[10px] opacity-80 mt-0.5 text-teal-100">Décupler sa productivité</div>
             </div>
           </a>
        </div>

        <div className="p-4 shrink-0 border-b border-slate-800/50 font-sans">
          <div className="grid grid-cols-4 gap-1.5 bg-slate-950 rounded-2xl p-1.5 border border-slate-800">
            <button onClick=${() => setSidebarTab('files')} className=${`flex flex-col justify-center items-center gap-1.5 text-[10px] font-bold py-2 rounded-xl transition-all ${sidebarTab === 'files' ? 'bg-slate-800 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}><${FileText} size=${16}/> Notes</button>
            <button onClick=${() => setSidebarTab('mindmaps')} className=${`flex flex-col justify-center items-center gap-1.5 text-[10px] font-bold py-2 rounded-xl transition-all ${sidebarTab === 'mindmaps' ? 'bg-slate-800 text-white shadow' : 'text-slate-500 hover:text-slate-300'}`}><${Network} size=${16}/> Cartes</button>
            <button onClick=${() => { setSidebarTab('agenda'); setViewMode('agenda'); if(window.innerWidth < 1024) setLeftSidebarOpen(false); }} className=${`flex flex-col justify-center items-center gap-1.5 text-[10px] font-bold py-2 rounded-xl transition-all ${sidebarTab === 'agenda' ? 'bg-teal-600/20 text-teal-400 shadow border border-teal-500/30' : 'text-slate-500 hover:text-slate-300'}`}><${Calendar} size=${16}/> Agenda</button>
            <button onClick=${() => { setSidebarTab('trash'); setViewMode('trash'); if(window.innerWidth < 1024) setLeftSidebarOpen(false); }} className=${`flex flex-col justify-center items-center gap-1.5 text-[10px] font-bold py-2 rounded-xl transition-all ${sidebarTab === 'trash' ? 'bg-rose-500/20 text-rose-400 shadow border border-rose-500/30' : 'text-slate-500 hover:text-rose-400'}`}><${Trash} size=${16}/> Corbeille</button>

          </button>

              <${Plus} size=${18} /> ${sidebarTab === 'files' ? 'Créer une Note' : 'Créer une Carte'}

              <input type="text" placeholder="Recherche..." value=${searchQuery} onChange=${(e) => setSearchQuery(e.target.value)} className="w-full bg-slate-950 text-[14px] text-slate-200 rounded-xl py-3 pl-10 pr-4 outline-none border border-slate-800 focus:border-teal-500/50 transition-all placeholder-slate-600 shadow-inner" />

                <h4 className="text-[11px] font-bold text-teal-500 uppercase tracking-wider mb-3 pl-2">Résultats de recherche (${textNotes.length})</h4>
                ${textNotes.length === 0 ? html`<p className="text-center text-sm text-slate-600 mt-6 font-serif italic">Aucune note trouvée.</p>` : null}
                ${textNotes.map(note => {
                  const isSelected = activeNoteId === note.id && !['agenda', 'graph', 'trash', 'settings'].includes(viewMode);
                  const isSecured = note.isLocked && !unlockedNotes.has(note.id);
                  let snippetHtml = null;

                              }} 
                              className="bg-slate-950 border border-slate-800 hover:border-teal-500/40 p-4 rounded-xl cursor-pointer group transition-colors shadow-sm">
                              <h5 className=${`text-sm font-semibold flex items-center gap-2 mb-1 ${b.isLocked ? 'text-rose-400' : b.type === 'mindmap' ? 'text-amber-400' : 'text-teal-400'}`}>
                                ${b.isLocked ? html`<${Lock} size=${14} />` : b.type === 'mindmap' ? html`<${Network} size=${14} />` : html`<${FileText} size=${14} />`} ${b.title}
                              </h5>
                              <p className="text-[10px] text-slate-500 font-mono opacity-80 group-hover:opacity-100">Mention explicite via [[ ]]</p>
                            </div>
                          `)}
                        </div>
                      `}
                    </div>

                    <div>
                      <h4 className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 flex items-center gap-2"><${Search} size=${14} className="text-purple-500"/> Mentions Non Liées (${implicitBacklinks.length})</h4>
                      ${implicitBacklinks.length === 0 ? html`
                        <p className="text-xs text-slate-600 bg-slate-950 p-4 rounded-xl border border-slate-800/50 text-center italic">Aucune mention découverte.</p>
                      ` : html`
                        <div className="space-y-3">
                          ${implicitBacklinks.map((b, idx) => html`
                            <div key=${`impl-${idx}`} onClick=${() => {
                                if (b.isLocked && !unlockedNotes.has(b.id)) { alert("Note verrouillée."); return;}
                                navigateToLink(b.title);
                                if (window.innerWidth < 1024) setRightSidebarOpen(false);
                              }} 
                              className="bg-slate-950 border border-slate-800 hover:border-purple-500/40 p-4 rounded-xl cursor-pointer group transition-colors shadow-sm">
                              <h5 className="text-sm font-semibold flex items-center gap-2 mb-1 text-slate-300 group-hover:text-purple-400 transition-colors">
                                ${b.isLocked ? html`<${Lock} size=${14} />` : b.type === 'mindmap' ? html`<${Network} size=${14} />` : html`<${FileText} size=${14} />`} ${b.title}
                              </h5>
                              <p className="text-[10px] text-slate-500 font-mono opacity-80 group-hover:opacity-100">Cité naturellement dans le texte</p>
                            </div>
                          `)}
                        </div>
                      `}
                    </div>
                  </div>
                </div>
              ` : null}
            </div>
          ` : html`
            <div className="flex-1 flex flex-col items-center justify-center text-slate-500 px-4 font-sans bg-slate-950">
              <div className="bg-slate-900 p-10 rounded-[2.5rem] border border-slate-800 shadow-2xl flex flex-col items-center text-center max-w-md w-full relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-teal-500 to-purple-500"></div>
                <${Feather} size=${56} className="mb-6 text-teal-500/40" />
                <h2 className="text-3xl font-serif font-bold text-white mb-3 tracking-wide">Erza Spark</h2>
                <p className="text-sm text-slate-400 mb-8 leading-relaxed font-medium">L'élégance de la pensée structurée. Espace 100% Local.</p>
                <div className="flex flex-col gap-3 w-full">
                  <button onClick=${() => createDocument('note')} className="w-full bg-teal-600 hover:bg-teal-500 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all shadow-lg shadow-teal-500/20"><${Plus} size=${18} /> Nouvelle Note</button>
                  <button onClick=${() => createDocument('mindmap')} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all border border-slate-700"><${Network} size=${18} /> Nouvelle Carte</button>
                </div>
              </div>
            </div>
          `}
        </div>
      </div>
    </div>
  `;
}

// --- MAIN RUNNER ---
const rootElement = document.getElementById('root');
const root = createRoot(rootElement);
root.render(html`<${MainApp} />`);
    </script>
</body>
</html>
